<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" role="img" aria-label="AI-Augmented SOC Pipeline architecture diagram">
  <title>AI-Augmented SOC Pipeline</title>
  <desc>Logs flow from a Kali VM and a Raspberry Pi through Filebeat, Logstash, Elasticsearch, and Kibana, then alerts are sent to Python and Claude Sonnet 4.5 for AI triage and saved as JSON incident reports.</desc>

  <style>
    /* Light mode (default) */
    .bg            { fill: #fafaf9; }
    .grid-dot      { fill: #e7e5e4; }
    .title-text    { fill: #0c0a09; }
    .sub-text      { fill: #78716c; }
    .phase-label   { fill: #57534e; }
    .phase-num     { fill: #a8a29e; }
    .box           { fill: #ffffff; stroke: #d6d3d1; stroke-width: 1; }
    .box-label     { fill: #1c1917; }
    .box-meta      { fill: #78716c; }
    .arrow         { stroke: #a8a29e; }
    .arrow-fill    { fill: #a8a29e; }
    .ai-glow       { fill: #fef3c7; opacity: 0.55; }
    .junction      { fill: #a8a29e; }
    .annotation    { fill: #a8a29e; }

    .accent-attack    { fill: #dc2626; }
    .accent-target    { fill: #2563eb; }
    .accent-pipeline  { fill: #0891b2; }
    .accent-ai        { fill: #d97706; }
    .accent-output    { fill: #16a34a; }

    @media (prefers-color-scheme: dark) {
      .bg          { fill: #0c0a09; }
      .grid-dot    { fill: #292524; }
      .title-text  { fill: #fafaf9; }
      .sub-text    { fill: #a8a29e; }
      .phase-label { fill: #d6d3d1; }
      .phase-num   { fill: #57534e; }
      .box         { fill: #1c1917; stroke: #44403c; }
      .box-label   { fill: #f5f5f4; }
      .box-meta    { fill: #a8a29e; }
      .arrow       { stroke: #78716c; }
      .arrow-fill  { fill: #78716c; }
      .ai-glow     { fill: #78350f; opacity: 0.35; }
      .junction    { fill: #78716c; }
      .annotation  { fill: #78716c; }

      .accent-attack    { fill: #f87171; }
      .accent-target    { fill: #60a5fa; }
      .accent-pipeline  { fill: #22d3ee; }
      .accent-ai        { fill: #fbbf24; }
      .accent-output    { fill: #4ade80; }
    }
  </style>

  <defs>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" class="grid-dot"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="580"/>
  <rect width="900" height="580" fill="url(#dots)"/>

  <!-- Title -->
  <text x="40" y="48" class="title-text" font-size="22" font-weight="700">AI-Augmented SOC Pipeline</text>
  <text x="40" y="72" class="sub-text" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">raspberry pi 5  ·  elk stack 8.19  ·  claude sonnet 4.5</text>

  <!-- ============================================ -->
  <!-- PHASE 01 — SOURCES                           -->
  <!-- ============================================ -->
  <text x="40" y="130" font-size="10" font-weight="700" letter-spacing="2.5" class="phase-label">
    <tspan class="phase-num">01 · </tspan>SOURCES
  </text>

  <!-- Kali VM -->
  <g>
    <rect class="box" x="40" y="148" width="160" height="64" rx="6"/>
    <rect class="accent-attack" x="40" y="148" width="4" height="64" rx="2"/>
    <text x="60" y="178" class="box-label" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Kali VM</text>
    <text x="60" y="196" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">attacker · hydra · nmap</text>
  </g>

  <!-- Raspberry Pi -->
  <g>
    <rect class="box" x="40" y="296" width="160" height="64" rx="6"/>
    <rect class="accent-target" x="40" y="296" width="4" height="64" rx="2"/>
    <text x="60" y="326" class="box-label" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Raspberry Pi 5</text>
    <text x="60" y="344" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">target · 4gb · debian</text>
  </g>

  <!-- ============================================ -->
  <!-- PHASE 02 — ELK PIPELINE                      -->
  <!-- ============================================ -->
  <text x="240" y="190" font-size="10" font-weight="700" letter-spacing="2.5" class="phase-label">
    <tspan class="phase-num">02 · </tspan>ELK PIPELINE
  </text>

  <!-- Filebeat -->
  <g>
    <rect class="box" x="240" y="208" width="120" height="64" rx="6"/>
    <rect class="accent-pipeline" x="240" y="208" width="4" height="64" rx="2"/>
    <text x="260" y="238" class="box-label" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Filebeat</text>
    <text x="260" y="256" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">log shipper</text>
  </g>

  <!-- Logstash -->
  <g>
    <rect class="box" x="380" y="208" width="120" height="64" rx="6"/>
    <rect class="accent-pipeline" x="380" y="208" width="4" height="64" rx="2"/>
    <text x="400" y="238" class="box-label" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Logstash</text>
    <text x="400" y="256" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">parse + enrich</text>
  </g>

  <!-- Elasticsearch -->
  <g>
    <rect class="box" x="520" y="208" width="150" height="64" rx="6"/>
    <rect class="accent-pipeline" x="520" y="208" width="4" height="64" rx="2"/>
    <text x="540" y="238" class="box-label" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Elasticsearch</text>
    <text x="540" y="256" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">index + search</text>
  </g>

  <!-- Kibana -->
  <g>
    <rect class="box" x="690" y="208" width="120" height="64" rx="6"/>
    <rect class="accent-pipeline" x="690" y="208" width="4" height="64" rx="2"/>
    <text x="710" y="238" class="box-label" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Kibana</text>
    <text x="710" y="256" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">visualize + alert</text>
  </g>

  <!-- ============================================ -->
  <!-- PHASE 03 — AI TRIAGE                         -->
  <!-- ============================================ -->
  <text x="510" y="350" font-size="10" font-weight="700" letter-spacing="2.5" class="phase-label">
    <tspan class="phase-num">03 · </tspan>AI TRIAGE
  </text>

  <!-- Subtle warm glow behind AI box -->
  <rect class="ai-glow" x="500" y="362" width="280" height="84" rx="14"/>

  <!-- Python + Claude box -->
  <g>
    <rect class="box" x="510" y="368" width="260" height="72" rx="6"/>
    <rect class="accent-ai" x="510" y="368" width="4" height="72" rx="2"/>
    <text x="530" y="394" class="box-label" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Python + Claude Sonnet 4.5</text>
    <text x="530" y="414" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">tier 2 triage  ·  mitre att&amp;ck mapping</text>
    <text x="530" y="430" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">false-positive scoring  ·  remediation</text>
  </g>

  <!-- ============================================ -->
  <!-- PHASE 04 — OUTPUT                            -->
  <!-- ============================================ -->
  <text x="555" y="490" font-size="10" font-weight="700" letter-spacing="2.5" class="phase-label">
    <tspan class="phase-num">04 · </tspan>OUTPUT
  </text>

  <!-- JSON Report -->
  <g>
    <rect class="box" x="555" y="508" width="190" height="56" rx="6"/>
    <rect class="accent-output" x="555" y="508" width="4" height="56" rx="2"/>
    <text x="575" y="534" class="box-label" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">JSON Incident Report</text>
    <text x="575" y="552" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">output/alert_*.json</text>
  </g>

  <!-- ============================================ -->
  <!-- ARROWS                                       -->
  <!-- ============================================ -->

  <!-- Kali → junction (no arrowhead) -->
  <path d="M 200 180 H 220 V 240" class="arrow" fill="none" stroke-width="1.5"/>
  <!-- Pi → junction (no arrowhead) -->
  <path d="M 200 328 H 220 V 240" class="arrow" fill="none" stroke-width="1.5"/>
  <!-- Junction → Filebeat (with arrowhead) -->
  <path d="M 220 240 H 236" class="arrow" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Junction node -->
  <circle cx="220" cy="240" r="2.5" class="junction"/>

  <!-- Filebeat → Logstash -->
  <path d="M 360 240 H 376" class="arrow" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Logstash → Elasticsearch -->
  <path d="M 500 240 H 516" class="arrow" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Elasticsearch → Kibana -->
  <path d="M 670 240 H 686" class="arrow" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Kibana → Python+Claude (down + left + down) -->
  <path d="M 750 272 V 320 H 645 V 364" class="arrow" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Inline annotation on the Kibana → AI arrow -->
  <text x="660" y="338" class="annotation" font-size="10" font-style="italic" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">alerts via REST API</text>

  <!-- Python+Claude → JSON -->
  <path d="M 645 440 V 504" class="arrow" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================ -->
  <!-- DEFENSE-IN-DEPTH CALLOUT (balances layout)   -->
  <!-- ============================================ -->
  <text x="40" y="430" font-size="10" font-weight="700" letter-spacing="2.5" class="phase-label">
    DEFENSE-IN-DEPTH
  </text>
  <g>
    <rect class="box" x="40" y="448" width="160" height="86" rx="6" stroke-dasharray="3 3"/>
    <text x="58" y="472" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">› ufw firewall</text>
    <text x="58" y="490" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">› quad9 dns filtering</text>
    <text x="58" y="508" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">› hardened ssh (key-only)</text>
    <text x="58" y="526" class="box-meta" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">› filebeat self-monitoring</text>
  </g>

</svg>
